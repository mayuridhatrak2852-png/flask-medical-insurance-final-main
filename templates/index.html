<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Medical Insurance Charges Prediction</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <div class="container">
        <h1>Medical Health Insurance Charges Prediction</h1>

        <form method="POST" action="/predict">
            <label for="age">Age:</label>
            <input type="number" id="age" name="age" min="1" max="150" step="1" required>

            <label for="sex">Sex:</label>
            <select id="sex" name="sex" required>
                <option value="male">Male</option>
                <option value="female">Female</option>
            </select>

            <label for="bmi">BMI:</label>
            <input type="number" id="bmi" name="bmi" min="1" max="100" step="0.1" required>

            <label for="children">Number of Children:</label>
            <input type="number" id="children" name="children" min="0" max="20" step="1" required>

            <label for="smoker">Smoker:</label>
            <select id="smoker" name="smoker" required>
                <option value="no">No</option>
                <option value="yes">Yes</option>
            </select>

            <label for="region">Region:</label>
            <select id="region" name="region" required>
                <option value="southwest">Southwest</option>
                <option value="southeast">Southeast</option>
                <option value="northwest">Northwest</option>
                <option value="northeast">Northeast</option>
            </select>

            <input type="submit" value="Predict Charges">
        </form>

        {% if error %}
        <div class="error">
            <p>{{ error }}</p>
        </div>
        {% endif %}

        {% if charges is not none and charges is defined %}
        <div class="result">
            <h2>Prediction Result</h2>
            <p>Estimated Insurance Charges: <strong>${{ "%.2f"|format(charges) }}</strong></p>
        </div>
        {% endif %}
    </div>
</body>
</html>
